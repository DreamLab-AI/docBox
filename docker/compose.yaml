# docBox stack — single-host compose for the pilot (PRD-000 defers k8s/multi-host).
#
# NETWORK BOUNDARY (corpus/09-observability-audit/audit-architecture.md):
#   Write-only audit is enforced TOPOLOGICALLY, not by a promise in a handler.
#     - agent-net : control-plane, oauth2-proxy, agent, browser/vault sidecars,
#                   and ONLY the audit sidecar's ingest interface. This is where
#                   agents live. Egress IS restricted: the agent runs
#                   scripts/init-firewall.sh at startup, which installs a
#                   default-deny OUTPUT firewall and opens only the
#                   foreman.toml egress_allowlist. NET_ADMIN is granted to the
#                   agent service alone (see there) so it can apply those rules.
#     - audit-net : audit sidecar + audit storage (+ read console / SIEM
#                   forwarder). NO agent is attached. `internal: true` keeps the
#                   audit store off every other network. The sidecar is
#                   dual-homed; it accepts POSTs on agent-net and only ever reads
#                   its own volume on audit-net, so agents have no route to the
#                   read path.
#
# THREE STATE PLANES (corpus/10-architecture/snapshot-rollback.md) are kept in
# separate named volumes so the rollback boundary can cut System-Definition
# without touching User-Data or Audit:
#     docbox-system     System-Definition plane state (rollback target)
#     docbox-user-data  User-Data plane — projects/workspaces (never rolled back)
#     docbox-audit      Audit plane — append-only WORM (never rolled back)
#     docbox-vaults     gocryptfs cipherdirs (User-Data plane, at-rest encrypted)
#
# HOST PORTS are bound to 127.0.0.1 only (network.loopback_only). The box is
# reached from outside through the cloudflared tunnel overlay (compose.tunnel.yaml),
# never an open inbound port.
#
# CORE vs MODULES (ADR-009). Core services run by default: control-plane and
# audit-sidecar. The code-server surface (agent) is on by default too. Every
# optional MODULE service is behind a compose profile, so the default
# `docker compose up` brings up only the slim core, and a capability is enabled
# explicitly:
#     docker compose --profile local-model --profile browser --profile ocr up
# Profiles in this file are local-model, ocr, browser and vault-fuse. The profile
# name is not always the module id: local-ocr uses ocr, browser-sidecar uses
# browser, vault-sidecar uses vault-fuse. The tunnel is the compose.tunnel.yaml
# overlay; a streamed desktop is an ADR-009 candidate surface, not yet a service
# here.

name: docbox

# ---------------------------------------------------------------------------
# Reusable hardening anchor. Every service starts from deny-by-default and adds
# back only the capability it genuinely needs.
# ---------------------------------------------------------------------------
x-hardening: &hardening
  security_opt:
    - "no-new-privileges:true"
  cap_drop:
    - ALL
  restart: unless-stopped

services:

  # =========================================================================
  # oauth2-proxy — Microsoft Entra forward-auth (corpus/05-identity/entra-sso.md).
  # The single authenticated entry point. The tunnel targets THIS port; it
  # authenticates every request against Entra (ms-entra-id provider) and admits
  # only holders of the App Roles Sandbox.Admin / Sandbox.User before proxying to
  # the control plane. Stateless Go binary, cookie session store, no DB. MIT.
  #
  # code-server (the `agent` service) carries no native OIDC and runs --auth none;
  # it is reached THROUGH this proxy (the tunnel/edge terminates TLS, this gates
  # the App Role) and its own 8080 publish is loopback-only debug — see `agent`.
  # =========================================================================
  oauth2-proxy:
    <<: *hardening
    image: ${OAUTH2_PROXY_IMAGE:-quay.io/oauth2-proxy/oauth2-proxy:v7.7.1}
    env_file: [.env]
    environment:
      OAUTH2_PROXY_PROVIDER: "ms-entra-id"
      OAUTH2_PROXY_OIDC_ISSUER_URL: "https://login.microsoftonline.com/${ENTRA_TENANT_ID}/v2.0"
      OAUTH2_PROXY_CLIENT_ID: "${ENTRA_CLIENT_ID}"
      OAUTH2_PROXY_CLIENT_SECRET: "${ENTRA_CLIENT_SECRET}"
      OAUTH2_PROXY_COOKIE_SECRET: "${OAUTH2_PROXY_COOKIE_SECRET}"
      # Reverse-proxy the control plane; it arrives pre-authenticated.
      OAUTH2_PROXY_UPSTREAMS: "http://control-plane:8788"
      OAUTH2_PROXY_HTTP_ADDRESS: "0.0.0.0:4180"
      OAUTH2_PROXY_REVERSE_PROXY: "true"
      # Authorisation is the App Role, not the email domain. Keep the domain gate
      # open by default and let a deployment narrow it via .env; the role gate
      # below is the load-bearing control.
      OAUTH2_PROXY_EMAIL_DOMAINS: "${OAUTH2_PROXY_EMAIL_DOMAINS:-*}"
      OAUTH2_PROXY_SCOPE: "openid email profile"
      # Admit only assigned App Roles (Entra emits them in the `roles` claim).
      OAUTH2_PROXY_ALLOWED_ROLES: "${OAUTH2_PROXY_ALLOWED_ROLES:-Sandbox.Admin,Sandbox.User}"
      # Session cookie hardening. Lifetime tracks foreman.toml identity.session_ttl_min.
      OAUTH2_PROXY_SESSION_STORE_TYPE: "cookie"
      # No __Host- prefix: it would hard-require Secure, but COOKIE_SECURE is
      # configurable below so a local http tester can still sign in.
      OAUTH2_PROXY_COOKIE_NAME: "_docbox_session"
      OAUTH2_PROXY_COOKIE_HTTPONLY: "true"
      OAUTH2_PROXY_COOKIE_SAMESITE: "lax"
      # Secure cookies expect TLS (the tunnel/edge terminates it). A local tester
      # hitting plain-http loopback can set this false in .env.
      OAUTH2_PROXY_COOKIE_SECURE: "${OAUTH2_PROXY_COOKIE_SECURE:-true}"
      OAUTH2_PROXY_COOKIE_EXPIRE: "${OAUTH2_PROXY_COOKIE_EXPIRE:-15m}"
      OAUTH2_PROXY_COOKIE_REFRESH: "${OAUTH2_PROXY_COOKIE_REFRESH:-5m}"
      # Skip the interstitial provider-select page; pass identity to the upstream.
      OAUTH2_PROXY_SKIP_PROVIDER_BUTTON: "true"
      OAUTH2_PROXY_SET_XAUTHREQUEST: "true"
      OAUTH2_PROXY_PASS_ACCESS_TOKEN: "false"
      OAUTH2_PROXY_PASS_AUTHORIZATION_HEADER: "false"
    ports:
      # Loopback only — the tunnel connects here, never a public interface.
      - "127.0.0.1:${FOREMAN_PORT:-8443}:4180"
    networks: [agent-net]
    depends_on: [control-plane]

  # =========================================================================
  # control-plane — Foreman: the Hono server + built React UI (repo server/ + app/).
  # Renders the eight tabs (Overview, Visualiser, Activity, Work, Documents,
  # Configuration, Operations, System), owns foreman.toml, and drives the agent
  # + rebuild orchestration. Bound loopback-only for direct admin/debug; normal
  # traffic arrives pre-authenticated from oauth2-proxy.
  # =========================================================================
  control-plane:
    <<: *hardening
    image: ${DOCBOX_REGISTRY:-docbox}/control-plane:${DOCBOX_TAG:-dev}
    build:
      context: ..
      dockerfile: docker/Dockerfile.control-plane
    env_file: [.env]
    environment:
      PORT: "8788"                                    # bind port; matches the host mapping + oauth2 upstream
      FOREMAN_CONFIG: "/etc/docbox/foreman.toml"
      AUDIT_INGEST_URL: "http://audit-sidecar:9099/v1/events"
      AGENT_HOST: "agent"
    volumes:
      - ./foreman.toml:/etc/docbox/foreman.toml:ro   # the manifest the UI edits
      - docbox-system:/var/lib/docbox/system         # System-Definition plane
    ports:
      - "127.0.0.1:${CONTROL_PLANE_PORT:-8788}:8788"
    read_only: true
    tmpfs: ["/tmp"]
    networks: [agent-net]
    depends_on: [audit-sidecar]
    healthcheck:
      test: ["CMD", "curl", "-fsS", "http://localhost:8788/api/health"]
      interval: 15s
      timeout: 3s
      retries: 5
      start_period: 20s

  # =========================================================================
  # agent — the sandbox image (this repo's docker/Dockerfile). Hosts the pi
  # engine (run on demand by the control plane) and the persistent code-server
  # editor. Attached to agent-net ONLY: it can reach the audit ingest port and
  # the sidecars. It has NO route to audit-net.
  #
  # EGRESS IS DEFAULT-DENY. The image ships scripts/init-firewall.sh and a startup
  # wrapper (docker/docbox-entrypoint.sh); on start the wrapper runs the firewall
  # as root — installing an iptables/ipset OUTPUT allowlist from the mounted
  # foreman.toml egress_allowlist — then drops to the unprivileged `dev` user for
  # code-server. DOCBOX_EGRESS_FIREWALL=1 makes this fail closed: no rules, no
  # start. This is the ONE service granted NET_ADMIN (below), used once at startup
  # then shed with the privilege drop.
  # =========================================================================
  agent:
    <<: *hardening
    image: ${DOCBOX_REGISTRY:-docbox}/sandbox:${DOCBOX_TAG:-dev}
    build:
      context: ..
      dockerfile: docker/Dockerfile
      args:
        # Bundle gates come from .env, which the control plane writes from
        # foreman.toml [toolchain] on a rebuild-class change.
        TS_DASHBOARD: "${TS_DASHBOARD:-1}"
        PYTHON: "${PYTHON:-1}"
        TYPESETTING: "${TYPESETTING:-typst}"
        PLAYWRIGHT_BROWSERS: "${PLAYWRIGHT_BROWSERS:-1}"
    env_file: [.env]
    environment:
      # Identity is injected by the trusted spawner, never forgeable by prompt
      # content (corpus/09). The HMAC key is mounted read-only, not passed here.
      AUDIT_INGEST_URL: "http://audit-sidecar:9099/v1/events"
      # Enforce the egress firewall (fail closed). init-firewall.sh reads the
      # allowlist from the foreman.toml mounted below (or $EGRESS_ALLOWLIST).
      DOCBOX_EGRESS_FIREWALL: "1"
    volumes:
      - ./foreman.toml:/etc/docbox/foreman.toml:ro   # egress allowlist source for init-firewall.sh
      - docbox-user-data:/workspace                  # User-Data plane
      - docbox-vaults:/vaults                         # gocryptfs cipherdirs
      - docbox-pnpm-store:/usr/local/pnpm/store       # shared pnpm store (cache)
      - docbox-uv-store:/opt/uv/cache                 # shared uv store (cache)
    # The one capability the default-deny egress needs. NET_ADMIN lets the startup
    # wrapper install the OUTPUT allowlist; it is used once, then privilege is
    # dropped to `dev` (setpriv, no inherited caps), so the workload holds nothing.
    # cap_drop:[ALL] + no-new-privileges from the hardening anchor otherwise stand,
    # and NET_ADMIN is scoped to THIS service alone.
    cap_add: [NET_ADMIN]
    command:
      - code-server
      - --auth
      - none
      - --bind-addr
      - 0.0.0.0:8080
      - /workspace
    ports:
      # Loopback only; sits behind oauth2-proxy forward-auth in production.
      - "127.0.0.1:${CODE_SERVER_PORT:-8080}:8080"
    networks: [agent-net]
    depends_on: [audit-sidecar]

  # =========================================================================
  # local-model — serves the embedded weights over an OpenAI-compatible API,
  # entirely inside the box. This is the privacy path: an agent routed to the
  # local endpoint (foreman.toml [models.local].endpoint) reaches OpenAI's
  # gpt-oss weights (Apache-2.0) through the same OpenAI-compatible code path as
  # the cloud provider, but no prompt ever leaves the host.
  #
  # The image shown is Ollama (serves gpt-oss and exposes /v1). Swap it for a
  # vLLM or llama.cpp server image when foreman.toml [models.local].runtime says
  # so — a rebuild-class change. gpt-oss-120b needs a GPU: uncomment the deploy
  # reservation below and run the stack on a GPU host.
  # Attached to agent-net ONLY; loopback-bound; no route to audit-net.
  # =========================================================================
  local-model:
    <<: *hardening
    image: ollama/ollama:0.13.0
    env_file: [.env]
    environment:
      # e.g. gpt-oss-20b, gpt-oss-120b, qwen3-8b — pulled on first start.
      LOCAL_MODEL: "${LOCAL_MODEL:-qwen3-8b}"
    entrypoint: ["/bin/sh", "-c"]
    command:
      - |
        ollama serve &
        until ollama list >/dev/null 2>&1; do sleep 1; done
        ollama pull "${LOCAL_MODEL}" || echo "pull deferred; model name maps to a runtime tag"
        wait
    volumes:
      - docbox-model-cache:/root/.ollama
    ports:
      # Loopback only; the agent reaches it in-network at http://local-model:11434.
      - "127.0.0.1:${LOCAL_MODEL_PORT:-11434}:11434"
    networks: [agent-net]
    profiles: ["local-model"]   # module (ADR-009); enable: docker compose --profile local-model up
    # gpt-oss-120b (and vLLM throughput) needs a GPU. Uncomment on a GPU host:
    # deploy:
    #   resources:
    #     reservations:
    #       devices:
    #         - driver: nvidia
    #           count: 1
    #           capabilities: [gpu]

  # =========================================================================
  # local-ocr — the private OCR route. A vision model (Qwen-VL by default) reads
  # uploaded documents in-box and returns text + per-field confidence. When
  # foreman.toml [ocr].route is a cloud provider instead, this service is unused
  # and the page image is sent out — that is the per-feature privacy switch.
  # No open model reads messy handwriting reliably, so low-confidence fields are
  # routed to human review (see [ocr].confidence_review). Same serving pattern
  # as local-model; needs a GPU for the larger VLMs (uncomment the reservation).
  # Attached to agent-net ONLY; loopback-bound.
  # =========================================================================
  local-ocr:
    <<: *hardening
    image: ollama/ollama:0.13.0
    env_file: [.env]
    environment:
      OCR_MODEL: "${OCR_MODEL:-qwen2.5-vl}"
    entrypoint: ["/bin/sh", "-c"]
    command:
      - |
        ollama serve &
        until ollama list >/dev/null 2>&1; do sleep 1; done
        ollama pull "${OCR_MODEL}" || echo "pull deferred; model name maps to a runtime tag"
        wait
    volumes:
      - docbox-model-cache:/root/.ollama
    ports:
      - "127.0.0.1:${OCR_PORT:-11435}:11434"
    networks: [agent-net]
    profiles: ["ocr"]     # started only when the OCR feature is enabled
    # deploy:              # uncomment on a GPU host for the larger vision models
    #   resources:
    #     reservations:
    #       devices:
    #         - driver: nvidia
    #           count: 1
    #           capabilities: [gpu]

  # =========================================================================
  # audit-sidecar — write-only, append-only, DUAL-HOMED. Ingest (POST /v1/events)
  # is served on agent-net; the audit volume and any read/query path live on
  # audit-net where no agent can reach. The append-only inode (chattr +a) on the
  # active segment is set by a privileged init that then drops CAP_LINUX_IMMUTABLE
  # — even a compromised sidecar can append but not truncate or rewrite.
  #
  # The sidecar image (docker/Dockerfile.audit) builds the audit ingest from the
  # @docbox/server package and runs its `start:audit` entry.
  # =========================================================================
  audit-sidecar:
    <<: *hardening
    image: ${DOCBOX_REGISTRY:-docbox}/audit-sidecar:${DOCBOX_TAG:-dev}
    build:
      context: ..
      dockerfile: docker/Dockerfile.audit
    env_file: [.env]
    environment:
      AUDIT_PORT: "9099"                             # ingest bind port (matches the audit-sidecar:9099 refs)
      AUDIT_LOG_PATH: "/var/lib/docbox/audit/events.jsonl"  # append target on the mounted audit volume below
      AUDIT_ANCHOR_INTERVAL_MIN: "${AUDIT_ANCHOR_INTERVAL_MIN:-60}"
    volumes:
      # Owned by a dedicated audit uid, mounted into NO agent container.
      - docbox-audit:/var/lib/docbox/audit
    # LINUX_IMMUTABLE lets the init set the append-only inode, then it is dropped.
    cap_add: [LINUX_IMMUTABLE]
    networks:
      - agent-net    # ingest interface (write path)
      - audit-net    # storage + read console (never crosses to agents)
    healthcheck:
      test: ["CMD", "curl", "-fsS", "http://localhost:9099/health"]
      interval: 15s
      timeout: 3s
      retries: 5
      start_period: 15s

  # =========================================================================
  # browser-sidecar — confined chrome-devtools for agent browsing. Isolated on
  # agent-net, no host port, hardened. Emits ARTIFACT events (screenshots/network
  # by content hash) to the audit sidecar. Never given a writable app mount.
  # =========================================================================
  browser-sidecar:
    <<: *hardening
    # The UNDETECTABLE path (matches the agentbox browsercontainer): real Google
    # Chrome, headful in Xvfb, GPU-accelerated (Vulkan/ANGLE/WebGPU), driven via
    # chrome-devtools-mcp/CDP. Headless images (browserless=SSPL, alpine-chrome,
    # headless-shell) carry the chromium-headless-shell + SwiftShader fingerprints
    # that bot-detection flags; this does not.
    # LICENCE: Google Chrome is proprietary Google freeware — a DELIBERATE
    # exception to the permissive-only rule (operator decision: undetectability
    # over licence purity for browsing). See docker/Dockerfile.browser.
    build:
      context: ..
      dockerfile: docker/Dockerfile.browser
    # Fixed image name (not ${BROWSER_IMAGE}) on purpose: a stale BROWSER_IMAGE
    # in someone's .env must NOT be able to swap this for a headless image and
    # silently re-detectable-ify the sidecar. The undetectable build is the only
    # supported path for this module.
    image: docbox/browser:dev
    env_file: [.env]
    # Chrome needs shared memory; give it a bounded tmpfs instead of host shm.
    shm_size: "512m"
    tmpfs: ["/tmp"]
    ports:
      - "127.0.0.1:${BROWSER_VNC_PORT:-5903}:5903"   # loopback VNC view (debug)
    networks: [agent-net]
    profiles: ["browser"]   # module (ADR-009); enable: docker compose --profile browser up
    # Real GPU acceleration is what keeps the renderer strings genuine. Uncomment
    # on an NVIDIA host; without a GPU Chrome falls back to software rendering,
    # which reintroduces the SwiftShader tell.
    # deploy:
    #   resources:
    #     reservations:
    #       devices:
    #         - driver: nvidia
    #           count: 1
    #           capabilities: [gpu]

  # =========================================================================
  # vault-sidecar — gocryptfs live-FUSE unlock (corpus/05-identity/encrypted-vaults.md).
  # OPTIONAL: only the "gocryptfs-fuse" engine needs a live sidecar and the FUSE
  # privileges below. The DEFAULT engine (gocryptfs-unlock, decrypt-on-unlock)
  # needs ZERO container privilege and no sidecar at all — the control plane runs
  # the unlock job and the agent mounts a plain volume. Guarded by a profile so
  # it is absent unless explicitly requested.
  # =========================================================================
  vault-sidecar:
    <<: *hardening
    image: ${DOCBOX_REGISTRY:-docbox}/vault-sidecar:${DOCBOX_TAG:-dev}
    build:
      context: ..
      dockerfile: docker/Dockerfile.vault
    profiles: ["vault-fuse"]
    env_file: [.env]
    environment:
      # Cipherdir + plaintext mount both live under the docbox-vaults volume. The
      # passphrase comes from VAULT_PASSFILE (a mounted secret) or VAULT_PASSPHRASE
      # in .env; the launch script prefers the file. Never hardcode it here.
      VAULT_CIPHERDIR: "${VAULT_CIPHERDIR:-/vaults/default/cipher}"
      VAULT_MOUNTPOINT: "${VAULT_MOUNTPOINT:-/vaults/default/plain}"
    # gocryptfs FUSE needs /dev/fuse + SYS_ADMIN + apparmor:unconfined on Ubuntu
    # — NOT --privileged. Only the fuse engine takes on this surface, and only
    # this one sidecar; no agent carries it.
    cap_add: [SYS_ADMIN]
    devices: ["/dev/fuse"]
    security_opt:
      - "no-new-privileges:true"
      - "apparmor:unconfined"
    # A passphrase from the environment is staged on RAM-backed /tmp, never disk.
    tmpfs: ["/tmp"]
    volumes:
      - docbox-vaults:/vaults
    networks: [agent-net]

networks:
  # Control-plane + agents + sidecar ingest. A normal bridge (NOT internal):
  # providers and registries must stay reachable. Outbound is not open, though —
  # the agent applies a default-deny egress firewall at startup (init-firewall.sh)
  # that permits only the foreman.toml allowlist. The bridge stays routable so
  # that allowlist can resolve; the per-container OUTPUT rules do the gating.
  agent-net:
    driver: bridge
  # Audit storage isolation. internal:true means nothing here can reach any
  # other network or the internet. The off-box anchor/SIEM forwarder (M6)
  # attaches separately to a dedicated egress, never to the store's network.
  audit-net:
    driver: bridge
    internal: true

volumes:
  docbox-system:      # System-Definition plane — rollback target
  docbox-user-data:   # User-Data plane — never a rollback target
  docbox-audit:       # Audit plane — append-only WORM, never a rollback target
  docbox-vaults:      # gocryptfs cipherdirs
  docbox-pnpm-store:  # shared pnpm content store (cache, not a plane)
  docbox-uv-store:    # shared uv package cache (cache, not a plane)
  docbox-model-cache: # downloaded local-model weights (cache, not a plane)
